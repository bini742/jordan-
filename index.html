<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NIKE AIR JORDAN ONE</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Manrope:wght@200..800&display=swap" rel="stylesheet">
    <link href="https://fonts.cdnfonts.com/css/thunder-2" rel="stylesheet">
</head>
<body>
<div class="bg-layer bg-a" id="bgA"></div>
<div class="bg-layer bg-b" id="bgB"></div>

<div class="particles">
    <span></span><span></span><span></span><span></span><span></span>
    <span></span><span></span><span></span><span></span><span></span>
</div>
<div class="glow-orb" id="glowOrb"></div>
<nav class="navigation-bar nav-animate">
    <div class="logo-div">
        <img src="/project/project-8/img/Logo.svg" alt="" class="logo">
    </div>
    <div class="nav-links">
        <button class="nav-btn active">Home</button>
        <button class="nav-btn">Our Story</button>
        <button class="nav-btn">Contact</button>
        <button class="nav-btn">Jordan Series</button>
    </div>
    <div class="nav-actions">
        <button class="icon-btn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        </button>
        <button class="icon-btn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
        </button>
        <button class="icon-btn">
            <img src="/project/project-8/img/Vector3.png" alt="" class="svg">
        </button>
    </div>
</nav>
<div class="hero-stage">
    <p class="jordan-bg-text">JORDAN</p>
    <div class="shoe-slides-wrapper">
        <div class="shoe-slide active-slide" id="slide-0">
            <img src="/project/project-8/img/Jordan Blue.png" alt="Blue Jordan" class="hero-img float-shoe">
        </div>
        <div class="shoe-slide" id="slide-1">
            <img src="/project/project-8/img/Jordan Black.png" alt="Black Jordan" class="hero-img float-shoe">
        </div>
        <div class="shoe-slide" id="slide-2">
            <img src="/project/project-8/img/Jordan Red.png" alt="Red Jordan" class="hero-img float-shoe">
        </div>
        <div class="shoe-slide" id="slide-3">
            <img src="/project/project-8/img/jordan teal (1).png" alt="Teal Jordan" class="hero-img float-shoe">
        </div>
    </div>
    <div class="product-info animate-left">
        <p class="product-name" id="productName">NIKE AIR<br>JORDAN ONE</p>
        <p class="description" id="productDesc">Built for speed and confidence, every pair combines premium materials and bold design. Engineered for comfort, made for movement.</p>
        <button class="add-to-bag">ADD TO BAG +</button>
    </div>
    <div class="size-block animate-right">
        <p class="size-label">CHOOSE YOUR SIZE</p>
        <div class="size-row">
            <div class="size-btn">40</div>
            <div class="size-btn">42</div>
            <div class="size-btn">44</div>
        </div>
    </div>

    <div class="quote-row animate-fade">
        <hr class="hline">
        <p class="quote-text">"Iconic Style, Built Different."</p>
        <hr class="hline">
    </div>

</div>
<div class="scroll-dots">
    <div class="sdot active" data-i="0"></div>
    <div class="sdot" data-i="1"></div>
    <div class="sdot" data-i="2"></div>
    <div class="sdot" data-i="3"></div>
</div>

<script>
    const themes = [
        { bg:'radial-gradient(circle at 40% 50%,#2a5cb8 0%,#0a2d6e 50%,#051840 100%)', glow:'rgba(64,122,208,0.55)',
            name:'NIKE AIR<br>JORDAN ONE', desc:'Built for speed and confidence, every pair combines premium materials and bold design. Engineered for comfort, made for movement.' },
        { bg:'radial-gradient(circle at 40% 50%,#3a3a3a 0%,#111 50%,#050505 100%)',    glow:'rgba(80,80,80,0.5)',
            name:'NIKE AIR<br>JORDAN ONE', desc:'Shadow edition. Stealth meets style in a monochrome masterpiece. Pure black. Zero compromise. Made for the bold.' },
        { bg:'radial-gradient(circle at 40% 50%,#c0392b 0%,#6a0808 50%,#3a0404 100%)', glow:'rgba(180,30,30,0.55)',
            name:'NIKE AIR<br>JORDAN ONE', desc:'Bred colorway. The one that started it all. Fire red and black in perfect balance. A legend, reborn.' },
        { bg:'radial-gradient(circle at 40% 50%,#00b4a0 0%,#005548 50%,#002e28 100%)', glow:'rgba(0,180,160,0.5)',
            name:'NIKE AIR<br>JORDAN ONE', desc:'Aqua teal edition. Fresh energy meets iconic silhouette. Vibrant, bold, and unmistakable. Own the court.' }
    ];

    const slides   = document.querySelectorAll('.shoe-slide');
    const sdots    = document.querySelectorAll('.sdot');
    const glowOrb  = document.getElementById('glowOrb');
    const prodName = document.getElementById('productName');
    const prodDesc = document.getElementById('productDesc');
    const bgA      = document.getElementById('bgA');
    const bgB      = document.getElementById('bgB');
    let activeBg = 'a';

    function crossFadeBg(gradient) {
        if (activeBg === 'a') {
            bgB.style.background = gradient;
            bgB.style.opacity    = '1';
            bgA.style.opacity    = '0';
            activeBg = 'b';
        } else {
            // Paint new bg on A, fade A in, fade B out
            bgA.style.background = gradient;
            bgA.style.opacity    = '1';
            bgB.style.opacity    = '0';
            activeBg = 'a';
        }
    }

    let current = 0, animating = false, scrollAcc = 0;

    function goTo(index, dir = 'next') {
        if (animating || index === current) return;
        animating = true;
        const prev = current; current = index;

        slides[prev].classList.remove('active-slide');
        slides[prev].classList.add(dir === 'next' ? 'slide-exit-up' : 'slide-exit-down');
        setTimeout(() => slides[prev].classList.remove('slide-exit-up','slide-exit-down'), 650);

        slides[current].classList.add(dir === 'next' ? 'slide-enter-down' : 'slide-enter-up');
        requestAnimationFrame(() => requestAnimationFrame(() => {
            slides[current].classList.remove('slide-enter-down','slide-enter-up');
            slides[current].classList.add('active-slide');
        }));

        crossFadeBg(themes[current].bg);
        glowOrb.style.background = themes[current].glow;

        prodName.classList.add('text-fade-out');
        prodDesc.classList.add('text-fade-out');
        setTimeout(() => {
            prodName.innerHTML = themes[current].name;
            prodDesc.innerHTML = themes[current].desc;
            prodName.classList.replace('text-fade-out','text-fade-in');
            prodDesc.classList.replace('text-fade-out','text-fade-in');
            setTimeout(() => { prodName.classList.remove('text-fade-in'); prodDesc.classList.remove('text-fade-in'); }, 400);
        }, 220);

        sdots.forEach((d,i) => d.classList.toggle('active', i === current));
        setTimeout(() => { animating = false; }, 680);
    }

    window.addEventListener('wheel', e => {
        e.preventDefault();
        scrollAcc += e.deltaY;
        if (scrollAcc >  80) { scrollAcc = 0; goTo((current+1)%themes.length,'next'); }
        if (scrollAcc < -80) { scrollAcc = 0; goTo((current-1+themes.length)%themes.length,'prev'); }
    }, { passive: false });

    let ty = 0;
    window.addEventListener('touchstart', e => { ty = e.touches[0].clientY; });
    window.addEventListener('touchend',   e => {
        const d = ty - e.changedTouches[0].clientY;
        if (Math.abs(d) > 40) goTo(d > 0 ? (current+1)%themes.length : (current-1+themes.length)%themes.length, d>0?'next':'prev');
    });

    sdots.forEach(d => d.addEventListener('click', () => goTo(+d.dataset.i, +d.dataset.i > current ? 'next':'prev')));

    document.querySelectorAll('.size-btn').forEach(btn => btn.addEventListener('click', () => {
        document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
    }));
    document.querySelectorAll('.nav-btn').forEach(btn => btn.addEventListener('click', () => {
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }));
</script>
</body>
</html>
